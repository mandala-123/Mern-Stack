<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    
    <link rel="stylesheet" href="../CSS/position.css">
</head>
<body>
    <div>
        <header>
            <h1>Forms</h1>
        </header>
            <main>
                <form>
                    <label >Name:</label>
                    <input type="text" placeholder="Pooja">
                    <br><br>
                    <label >Email:</label>
                    <input type="email" placeholder="pooja@example.com">
                    <br><br>
                    <label>Password:</label>
                    <input type="password" placeholder="pooja@1731">
                    <br><br>
                    <label>Mobile No:</label>
                    <input type="mobile no" placeholder="9150107335">
                    <br><br>
                    <label>Gender:</label>
                    <input type="radio" name="gender" id="1">Male
                    <input type="radio" name="gender" id="2">Female
                    <br><br>
                    <label>Qualification:</label>
                    <input type="checkbox">10(<sup>th</sup>)
                    <input type="checkbox">12(<sup>th</sup>)
                    <input type="checkbox">diploma
                    <input type="checkbox">Bachlors
                    <input type="checkbox">Masters
                    <input type="checkbox">phD

                    <br><br>
                    <label>D.O.B:</label>
                    <input type="datetime-local">

                    <br><br>
                    <label>Image:</label>
                    <input type="file">

                    <br><br>
                    <input type="submit" >
                </form>
            </main>
        

    </div>
    
</body>
</html>
